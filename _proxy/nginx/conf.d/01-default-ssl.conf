# Catch-all HTTPS default server
# Prevents unknown/missing Host headers from falling through to storeconsole.com
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/storeconsole.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storeconsole.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Close connection silently for unknown hosts
    return 444;
}
