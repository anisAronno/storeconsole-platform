server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.storeconsole.com;

    ssl_certificate     /etc/letsencrypt/live/storeconsole.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storeconsole.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "StoreConsole Dev Workspace";
    auth_basic_user_file /etc/nginx/auth/dev.htpasswd;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    # Browser fetches manifest without auth credentials — must bypass basic auth
    location = /manifest.webmanifest {
        auth_basic off;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $ws_m "storeconsole-workspace-nginx";
        proxy_pass http://$ws_m:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom error page when workspace is down (not redirect to production)
    error_page 502 503 504 = @workspace_down;
    location @workspace_down {
        auth_basic off;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Workspace Offline</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f172a;color:#94a3b8}.card{text-align:center;padding:2rem}h1{color:#f1f5f9;font-size:1.5rem}p{margin:.5rem 0}code{background:#1e293b;padding:.2rem .5rem;border-radius:.25rem;font-size:.85rem}</style></head><body><div class="card"><h1>&#128679; Workspace Offline</h1><p>The StoreConsole dev workspace is not running.</p><p>Start it with: <code>bash /opt/apps/workspace/ops/scripts/start-workspace.sh storeconsole</code></p></div></body></html>';
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_intercept_errors on;
        proxy_pass http://storeconsole-workspace-nginx:80;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name monitor.storeconsole.com;

    ssl_certificate     /etc/letsencrypt/live/storeconsole.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storeconsole.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), geolocation=(), microphone=(), camera=(), payment=()" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://beszel_hub;
    }
}
