# Hermes operator bot endpoint. Preserve current production behavior.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bot.storeconsole.com bot.anichur.com;

    ssl_certificate     /etc/letsencrypt/live/bot.storeconsole.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.storeconsole.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "Hermes Bot";
    auth_basic_user_file /etc/nginx/auth/bot.htpasswd;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    location /webhooks/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://172.20.0.1:8644/webhooks/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://172.20.0.1:9119;
    }
}
