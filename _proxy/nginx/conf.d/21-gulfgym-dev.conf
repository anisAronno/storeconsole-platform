# gulfgym-dev.anichur.com — workspace endpoint for GulfGym temporary development
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gulfgym-dev.anichur.com;

    ssl_certificate     /etc/letsencrypt/live/gulfgym.anichur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gulfgym.anichur.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "GulfGym Dev Workspace";
    auth_basic_user_file /etc/nginx/auth/gulfgym-dev.htpasswd;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    error_page 502 503 504 = @gulfgym_workspace_down;
    location @gulfgym_workspace_down {
        auth_basic off;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Workspace Offline</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f172a;color:#94a3b8}.card{text-align:center;padding:2rem}h1{color:#f1f5f9;font-size:1.5rem}p{margin:.5rem 0}code{background:#1e293b;padding:.2rem .5rem;border-radius:.25rem;font-size:.85rem}</style></head><body><div class="card"><h1>&#128679; Workspace Offline</h1><p>The GulfGym dev workspace is not running.</p><p>Start it with: <code>bash /opt/apps/workspace/ops/scripts/start-workspace.sh gulfgym</code></p></div></body></html>';
    }
    # Vite HMR WebSocket — bypass basic auth
    location = /__vite_ws {
        auth_basic off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 600;
        proxy_pass http://gulfgym-workspace-nginx:80;
    }

    # Vite dev assets — bypass basic auth
    location ~ ^/(@vite|@react-refresh|@id|node_modules/|resources/|vendor/) {
        auth_basic off;
        proxy_pass http://gulfgym-workspace-nginx:80;
        proxy_set_header Host $http_host;
    }

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gulfgym_ws "gulfgym-workspace-nginx";
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_intercept_errors on;
        proxy_pass http://$gulfgym_ws:80;
    }
}
