# focus-frontend.anichur.com — Cloudflare Flexible SSL (HTTP only on origin)
server {
    listen 80;
    listen [::]:80;
    server_name focus-frontend.anichur.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Next.js HMR WebSocket
    location /_next/webpack-hmr {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600;
        proxy_pass http://host-gateway:7003;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_pass http://host-gateway:7003;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name focus-frontend.anichur.com;

    ssl_certificate     /etc/letsencrypt/live/focus-backend.anichur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/focus-backend.anichur.com/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Next.js HMR WebSocket
    location /_next/webpack-hmr {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600;
        proxy_pass http://host-gateway:7003;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_pass http://host-gateway:7003;
    }
}
