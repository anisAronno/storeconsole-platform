# projects.anichur.com — Project staging / temp hosting
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    ssl_certificate     /etc/letsencrypt/live/gulfgym.anichur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gulfgym.anichur.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    server_name proj.anichur.com projects.anichur.com;

    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://temp-app-server:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
    }
}
