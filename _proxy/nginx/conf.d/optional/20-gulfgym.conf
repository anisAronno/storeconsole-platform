server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gulfgym.anichur.com;

    ssl_certificate     /etc/letsencrypt/live/gulfgym.anichur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gulfgym.anichur.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL_gg:10m;
    ssl_session_tickets off;

    root /opt/gulfgym-platform/gulfgym.anichur.com/public;
    index index.php;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 30;
        proxy_pass http://storeconsole-reverb:8080;
    }

    location ^~ /apps {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 30;
        proxy_pass http://storeconsole-reverb:8080;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gulfgym_fpm "gulfgym-php-fpm";
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_pass $gulfgym_fpm:9000;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name local.gulfgym.anichur.com gulfgym-local.anichur.com;

    ssl_certificate     /etc/letsencrypt/live/gulfgym.anichur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gulfgym.anichur.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "GulfGym Workspace";
    auth_basic_user_file /etc/nginx/auth/local.htpasswd;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    error_page 502 503 504 = @workspace_down;
    location @workspace_down {
        auth_basic off;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Workspace Offline</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f172a;color:#94a3b8}.card{text-align:center;padding:2rem}h1{color:#f1f5f9;font-size:1.5rem}p{margin:.5rem 0}code{background:#1e293b;padding:.2rem .5rem;border-radius:.25rem;font-size:.85rem}</style></head><body><div class="card"><h1>&#128679; Workspace Offline</h1><p>The GulfGym workspace is not running.</p><p>Start it with: <code>docker compose up -d</code></p></div></body></html>';
    }

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gulfgym_ws_upstream "host-gateway";
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_intercept_errors on;
        proxy_pass http://$gulfgym_ws_upstream:8085;
    }
}
