[databases]
storeconsole_production = host=postgres port=5432 dbname=storeconsole_production pool_size=20
storeconsole_staging = host=postgres port=5432 dbname=storeconsole_staging pool_size=10
storeconsole_dev = host=postgres port=5432 dbname=storeconsole_dev pool_size=10
pulse_production = host=postgres port=5432 dbname=pulse_production pool_size=5
pulse_staging = host=postgres port=5432 dbname=pulse_staging pool_size=5
pulse_dev = host=postgres port=5432 dbname=pulse_dev pool_size=5
gulfgym = host=postgres port=5432 dbname=gulfgym pool_size=10
storeconsole_workspace = host=postgres port=5432 dbname=storeconsole_workspace pool_size=10

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir = /tmp
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres
stats_users = postgres
pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
reserve_pool_size = 10
reserve_pool_timeout = 3
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
query_wait_timeout = 120
server_idle_timeout = 600
server_lifetime = 3600
log_connections = 1
log_disconnections = 1
