[program:storeconsole-dev-horizon]
command=php /opt/apps/storeconsole-dev/artisan horizon
directory=/opt/apps/storeconsole-dev
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/storeconsole-dev-horizon.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=3600

[program:storeconsole-dev-ssr]
command=php /opt/apps/storeconsole-dev/artisan inertia:start-ssr --runtime=node --no-interaction
directory=/opt/apps/storeconsole-dev
environment=SSR_URL="http://127.0.0.1:13714"
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/storeconsole-dev-ssr.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=10
