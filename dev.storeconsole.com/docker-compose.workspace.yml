name: storeconsole-workspace

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: storeconsole-workspace-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/apps/workspace/storeconsole-dev/codes/public:/var/www/html/public:ro
    networks:
      - private_backend
      - workspace_net
    depends_on:
      - php
    security_opt:
      - no-new-privileges:true

  php:
    image: ${STORECONSOLE_WS_IMAGE:-ghcr.io/anisaronno/storeconsole:latest-dev}
    container_name: storeconsole-workspace-php
    restart: unless-stopped
    command: ["php-fpm", "-F"]
    env_file:
      - /opt/storeconsole-platform/dev.storeconsole.com/.env
    volumes:
      - /opt/apps/workspace/storeconsole-dev/codes:/var/www/html
      - /opt/storeconsole-platform/dev.storeconsole.com/shared-storage:/var/www/html/storage
    networks:
      - private_backend
      - workspace_net
    security_opt:
      - no-new-privileges:true

  vite:
    image: node:22-alpine
    container_name: storeconsole-workspace-vite
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apk add --no-cache docker-cli -q && npm run dev"
    env_file:
      - /opt/storeconsole-platform/dev.storeconsole.com/.env
    environment:
      DOCKER: "true"
      APP_CONTAINER_NAME: "storeconsole-workspace-php"
      VITE_PORT: "5174"
      VITE_HMR_HOST: "dev.storeconsole.com"
      VITE_HMR_CLIENT_PORT: "443"
      VITE_DEV_SERVER_URL: "https://dev.storeconsole.com"
    volumes:
      - /opt/apps/workspace/storeconsole-dev/codes:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - workspace_net
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true

networks:
  private_backend:
    external: true
  workspace_net:
    name: storeconsole-workspace-net
    driver: bridge
