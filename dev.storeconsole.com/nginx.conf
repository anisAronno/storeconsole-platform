server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 20M;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Vite HMR WebSocket
    location = /__vite_ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 600;
        proxy_connect_timeout 10;
        proxy_pass http://storeconsole-workspace-vite:5174;
    }

    # Vite dev assets, virtual modules, source files, and node_modules
    location ~ ^/(@vite|@react-refresh|@id|node_modules/|resources/|modules/) {
        proxy_pass http://storeconsole-workspace-vite:5174;
        proxy_set_header Host $http_host;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_pass storeconsole-workspace-php:9000;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    location ~ /\. {
        deny all;
    }
}
